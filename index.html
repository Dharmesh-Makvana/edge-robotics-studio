<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <script>
    // Enforce HTTPS and WWW
    (function () {
      var host = window.location.hostname;
      var protocol = window.location.protocol;
      var isLocalhost = host === 'localhost' || host === '127.0.0.1';
      if (!isLocalhost && (host === 'edgeroboticsstudio.com' || protocol === 'http:')) {
        window.location.replace('https://www.edgeroboticsstudio.com' + window.location.pathname + window.location.search + window.location.hash);
      }
    })();
  </script>
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edge Robotics Studio</title>
  <meta name="description"
    content="An independent robotics studio founded by Dharmesh Makvana, specializing in ROS2, Embedded Systems, Computer Vision, and AI." />
  <meta name="keywords"
    content="Edge Robotics Studio, Robotics, ROS2, Embedded Systems, Computer Vision, AI, Automation, Gazebo, Simulation, PCB Design" />
  <meta name="author" content="Dharmesh Makvana" />
  <link id="canonical-link" rel="canonical" href="https://www.edgeroboticsstudio.com/" />
  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.edgeroboticsstudio.com/" />
  <meta property="og:title" content="Edge Robotics Studio" />
  <meta property="og:description" content="An independent robotics studio specializing in ROS2, Embedded Systems, Computer Vision, and AI." />
  <meta property="og:image" content="https://www.edgeroboticsstudio.com/favicon-512x512.png" />
  <meta property="og:site_name" content="Edge Robotics Studio" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Edge Robotics Studio" />
  <meta name="twitter:description" content="An independent robotics studio specializing in ROS2, Embedded Systems, Computer Vision, and AI." />
  <meta name="twitter:image" content="https://www.edgeroboticsstudio.com/favicon-512x512.png" />
  <script>
    (function (l) {
      if (l.search[1] === 'p') {
        var p = l.search.slice(1).split('&').filter(function (s) {
          return s.slice(0, 2) === 'p=';
        })[0];
        if (p !== undefined) {
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + (p.slice(2) || '/') +
            l.search.slice(1).split('&').filter(function (s) {
              return s.slice(0, 2) !== 'p=';
            }).join('&').replace(/~and~/g, '&').replace(/^(.+)$/, '?$1') +
            l.hash
          );
        }
      }
    })(window.location);
  </script>
  <style>
    /* Final resort to hide the floating reCAPTCHA badge */
    .grecaptcha-badge {
      visibility: hidden !important;
      display: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <!-- reCAPTCHA badge is hidden via CSS above; inline disclaimer shown in Contact form per Google ToS -->
</body>

</html>
