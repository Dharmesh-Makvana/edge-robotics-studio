name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main


permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set temporary Node 24 requirement (Auto-expires June 2, 2026)
        run: |
          if [ $(date +%Y%m%d) -lt 20260602 ]; then
            echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV
          fi
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
      - run: npm run build
      - name: Create CNAME
        run: echo "edgeroboticsstudio.com" > dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set temporary Node 24 requirement (Auto-expires June 2, 2026)
        run: |
          if [ $(date +%Y%m%d) -lt 20260602 ]; then
            echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV
          fi
      - uses: actions/deploy-pages@v4
